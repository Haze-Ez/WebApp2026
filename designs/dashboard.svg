<svg width="1440" height="900" viewBox="0 0 1440 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1440" height="900" fill="#F4F6F7"/>

  <!-- Nav Bar -->
  <rect width="1440" height="64" fill="#2C3E50"/>
  <text x="40" y="40" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="white">📚 LibraryApp</text>
