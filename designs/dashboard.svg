  <text x="60" y="605" font-family="Inter, sans-serif" font-size="13" fill="#7F8C8D">The Alchemist</text>
  <text x="360" y="605" font-family="Inter, sans-serif" font-size="13" fill="#7F8C8D">Paulo Coelho</text>
  <text x="560" y="605" font-family="Inter, sans-serif" font-size="13" fill="#7F8C8D">Nov 1, 2025</text>
  <text x="760" y="605" font-family="Inter, sans-serif" font-size="13" fill="#7F8C8D">Nov 14, 2025</text>
