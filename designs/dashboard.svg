  <rect x="950" y="493" width="80" height="24" rx="12" fill="#EAFAF1"/>
  <text x="990" y="509" font-family="Inter, sans-serif" font-size="12" fill="#27AE60" text-anchor="middle">Returned</text>
  <text x="1160" y="509" font-family="Inter, sans-serif" font-size="13" fill="#7F8C8D">—</text>

  <rect x="40" y="528" width="1360" height="48" fill="#FAFAFA" stroke="#E5E8E8" stroke-width="1"/>
  <text x="60" y="557" font-family="Inter, sans-serif" font-size="13" fill="#7F8C8D">Brave New World</text>
  <text x="360" y="557" font-family="Inter, sans-serif" font-size="13" fill="#7F8C8D">Aldous Huxley</text>
  <text x="560" y="557" font-family="Inter, sans-serif" font-size="13" fill="#7F8C8D">Dec 10, 2025</text>
  <text x="760" y="557" font-family="Inter, sans-serif" font-size="13" fill="#7F8C8D">Dec 30, 2025</text>
