  <text x="1160" y="205" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="white">Action</text>

  <!-- Row 1 - Active -->
  <rect x="40" y="222" width="1360" height="56" rx="0" fill="white" stroke="#E5E8E8" stroke-width="1"/>
